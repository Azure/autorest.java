steps:
  # Authenticate with Azure Artifacts npm feed
  - task: npmAuthenticate@0
    displayName: 'npm Authenticate on extension'
    inputs:
      workingFile: $(Build.SourcesDirectory)/typespec-extension/.npmrc

  - task: npmAuthenticate@0
    displayName: 'npm Authenticate on tests'
    inputs:
      workingFile: $(Build.SourcesDirectory)/typespec-tests/.npmrc
